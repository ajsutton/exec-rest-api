name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check src tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: mypy
        run: mypy src

  tests:
    name: tests (py${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
    env:
      FOUNDRY_VERSION: nightly-2025-04-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Cache foundry
        if: runner.os != 'Windows'
        id: foundry-cache
        uses: actions/cache@v4
        with:
          path: ~/.foundry/bin
          key: foundry-${{ runner.os }}-${{ env.FOUNDRY_VERSION }}
      - name: Install foundry (if cache miss)
        if: runner.os != 'Windows' && steps.foundry-cache.outputs.cache-hit != 'true'
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup -i ${FOUNDRY_VERSION}
      - name: Add foundry to PATH
        if: runner.os != 'Windows'
        run: echo "$HOME/.foundry/bin" >> $GITHUB_PATH
      - name: Verify anvil
        if: runner.os != 'Windows'
        run: anvil --version
      - name: pytest (with integration on Linux/macOS)
        if: runner.os != 'Windows'
        run: pytest -v --tb=short
      - name: pytest (unit only on Windows)
        if: runner.os == 'Windows'
        run: pytest tests/unit -v --tb=short
